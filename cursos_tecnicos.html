<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos Técnicos Gratuitos SED SENAI — Unidades Curriculares</title>
<style>
  :root {
    --roxo:       #A040C8;
    --magenta:    #D42090;
    --laranja:    #E05818;
    --verde:      #3CB832;
    --verde-logo: #50E860;
    --grad: linear-gradient(135deg, #A040C8 0%, #D42090 30%, #E05818 60%, #3CB832 100%);
    --grad-h: linear-gradient(135deg, #8A30A8 0%, #B81878 30%, #C04010 60%, #2A9824 100%);
    --verde-claro: #EDFBEE;
    --cinza:      #F5F5F5;
    --borda:      #DDD;
    --texto:      #1A1A1A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #F7F7F7; color: var(--texto); }

  /* ── Header com gradiente Ensino Técnico Gratuito ── */
  header {
    background: var(--grad);
    color: #fff;
    padding: 0;
  }
  .header-inner {
    padding: 18px 32px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-catec {
    font-size: 1.65rem;
    font-weight: 900;
    letter-spacing: 0;
    text-shadow: 0 2px 6px rgba(0,0,0,0.25);
    color: #fff;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; line-height: 1.3; }
  header p  { font-size: 0.82rem; opacity: 0.9; margin-top: 3px; }
  .header-faixa {
    height: 5px;
    background: linear-gradient(90deg, #A040C8, #D42090, #E05818, #CDA010, #3CB832);
  }

  /* ── Barra de controles ── */
  .controles {
    background: #fff;
    border-bottom: 2px solid var(--borda);
    padding: 14px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  }
  .controles input, .controles select {
    padding: 8px 12px;
    border: 1.5px solid var(--borda);
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
    background: #FAFAFA;
  }
  .controles input:focus, .controles select:focus {
    border-color: var(--magenta);
    box-shadow: 0 0 0 3px rgba(212,32,144,0.12);
    background: #fff;
  }
  .controles input { width: 280px; }
  .controles select { min-width: 190px; }
  .controles label { font-size: 0.78rem; color: #555; font-weight: 700; display: flex; flex-direction: column; gap: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  #contador { margin-left: auto; font-size: 0.84rem; color: #777; white-space: nowrap; font-weight: 600; }
  #btn-limpar {
    padding: 8px 16px;
    background: var(--grad);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.84rem;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.3px;
    transition: opacity 0.2s;
    align-self: flex-end;
  }
  #btn-limpar:hover { opacity: 0.85; }

  /* ── Conteúdo ── */
  .conteudo { padding: 22px 32px; }

  /* ── Tabela ── */
  .tabela-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--borda); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead th {
    background: linear-gradient(90deg, #8A30A8, #C01878, #C84010, #2A9824);
    color: #fff;
    padding: 12px 14px;
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    font-size: 0.83rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  thead th:hover { filter: brightness(1.15); }
  thead th .seta { font-size: 0.7rem; margin-left: 4px; opacity: 0.8; }
  tbody tr { border-bottom: 1px solid #EEE; transition: background 0.15s; }
  tbody tr:nth-child(even) { background: var(--cinza); }
  tbody tr:hover { background: var(--verde-claro); }
  td { padding: 9px 14px; vertical-align: middle; }

  /* ── Badges de módulo ── */
  .badge-modulo {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .mod-industria    { background: #FCE4EC; color: #C2185B; border: 1px solid #F48FB1; }
  .mod-introdutorio { background: #EDE7F6; color: #6A1B9A; border: 1px solid #CE93D8; }
  .mod-especifico   { background: #E3F2FD; color: #0D47A1; border: 1px solid #90CAF9; }
  .mod-inovacao     { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
  .mod-outro        { background: #ECEFF1; color: #37474F; border: 1px solid #B0BEC5; }

  /* ── Badge de período ── */
  .badge-periodo {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 700;
    background: linear-gradient(135deg, #A040C8, #D42090);
    color: #fff;
    white-space: nowrap;
  }

  .link-curso { color: var(--roxo); text-decoration: none; font-weight: 700; }
  .link-curso:hover { color: var(--magenta); text-decoration: underline; }

  .horas { font-weight: 800; text-align: center; color: var(--verde); }

  .nenhum { text-align: center; padding: 48px; color: #AAA; font-size: 1rem; }

  /* ── Cards de cursos ── */
  .resumo-cursos { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .card-curso {
    background: #fff;
    border: 2px solid var(--borda);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.82rem;
    display: flex;
    flex-direction: column;
    gap: 3px;
    cursor: pointer;
    transition: border 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .card-curso:hover {
    border-color: var(--magenta);
    box-shadow: 0 3px 12px rgba(212,32,144,0.18);
    transform: translateY(-1px);
  }
  .card-curso.ativo {
    border-color: var(--verde);
    background: var(--verde-claro);
    box-shadow: 0 3px 12px rgba(60,184,50,0.20);
  }
  .card-curso .nome-curso { font-weight: 800; color: var(--roxo); font-size: 0.83rem; }
  .card-curso.ativo .nome-curso { color: var(--verde); }
  .card-curso .info-curso { color: #888; font-size: 0.78rem; }

  /* ── Faixa decorativa abaixo dos controles ── */
  .faixa-grad {
    height: 3px;
    background: linear-gradient(90deg, #A040C8, #D42090, #E05818, #CDA010, #3CB832);
  }

  @media (max-width: 700px) {
    .controles { padding: 12px 16px; }
    .controles input { width: 100%; }
    .conteudo { padding: 14px 16px; }
    .header-inner { padding: 14px 16px; }
    header h1 { font-size: 1rem; }
    .logo-catec { font-size: 1.5rem; }
  }
</style>
</head>

function destaque(t,b){
  if(!b)return t;
  return t.replace(new RegExp("("+b.replace(/[.*+?^${}()|[]\]/g,"\$&")+")","gi"),'<mark style="background:#FFF9C4;border-radius:2px;padding:0 2px">$1</mark>');
}

// ── Estado ──────────────────────────────────────────────────────────────────
let sortCol = "curso", sortAsc = true, cursoFiltro = "";

// ── Inicializa select de cursos ─────────────────────────────────────────────
const selCurso = document.getElementById("filtro-curso");
CURSOS.forEach(c => {
  const op = document.createElement("option");
  op.value = c.nome;
  op.textContent = c.nome;
  selCurso.appendChild(op);
});

// ── Cards de cursos ─────────────────────────────────────────────────────────
const cardsDiv = document.getElementById("cards-cursos");
CURSOS.forEach(c => {
  const div = document.createElement("div");
  div.className = "card-curso";
  div.innerHTML = `<span class="nome-curso">${c.nome}</span><span class="info-curso">${c.unidades.length} UCs · ${c.totalHoras}h</span>`;
  div.addEventListener("click", () => {
    if (cursoFiltro === c.nome) {
      cursoFiltro = "";
      selCurso.value = "";
      div.classList.remove("ativo");
    } else {
      cursoFiltro = c.nome;
      selCurso.value = c.nome;
      document.querySelectorAll(".card-curso").forEach(d => d.classList.remove("ativo"));
      div.classList.add("ativo");
    }
    renderizar();
  });
  cardsDiv.appendChild(div);
});

// ── Helpers ─────────────────────────────────────────────────────────────────
function classeModulo(mod) {
  const m = mod.toLowerCase();
  if (m.includes("indústria") || m.includes("industria")) return "mod-industria";
  if (m.includes("introdutório") || m.includes("introdutorio")) return "mod-introdutorio";
  if (m.includes("específico") || m.includes("especifico")) return "mod-especifico";
  if (m.includes("inovação") || m.includes("inovacao")) return "mod-inovacao";
  return "mod-outro";
}

function normalizar(s) {
  return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
}

// ── Renderização ─────────────────────────────────────────────────────────────
function renderizar() {
  const busca = normalizar(document.getElementById("busca").value.trim());
  const filtroMod = document.getElementById("filtro-modulo").value;
  const filtroPerido = document.getElementById("filtro-periodo").value;
  cursoFiltro = selCurso.value;

  // Sincroniza cards
  document.querySelectorAll(".card-curso").forEach((d, i) => {
    d.classList.toggle("ativo", CURSOS[i].nome === cursoFiltro);
  });

  let linhas = [];
  CURSOS.forEach(curso => {
    if (cursoFiltro && curso.nome !== cursoFiltro) return;
    curso.unidades.forEach(u => {
      if (busca && !normalizar(u.nome).includes(busca) && !normalizar(curso.nome).includes(busca)) return;
      if (filtroMod) {
        if (filtroMod === "Específico" && !u.modulo.toLowerCase().includes("específico") && !u.modulo.toLowerCase().includes("especifico")) return;
        else if (filtroMod !== "Específico" && !u.modulo.toLowerCase().includes(normalizar(filtroMod))) return;
      }
      if (filtroPerido && u.periodo !== filtroPerido) return;
      linhas.push({curso: curso.nome, url: curso.url, periodo: u.periodo, modulo: u.modulo, nome: u.nome, horas: u.horas});
    });
  });

  // Ordenação
  const ordem = {
    "1º Período": 1, "2º Período": 2, "3º Período": 3, "4º Período": 4
  };
  linhas.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "horas") { va = +va; vb = +vb; }
    else if (sortCol === "periodo") { va = ordem[va] || 9; vb = ordem[vb] || 9; }
    else { va = normalizar(String(va)); vb = normalizar(String(vb)); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById("corpo");
  tbody.innerHTML = "";

  linhas.forEach(l => {
    const tr = document.createElement("tr");
    tr.innerHTML = '<td><a class="link-curso" href="'+l.url+'" target="_blank">'+l.curso+'</a></td>'+'<td><span class="badge-periodo">'+l.periodo+'</span></td>'+'<td><span class="badge-modulo '+classeModulo(l.modulo)+'">'+l.modulo+'</span></td>'+'<td>'+destaque(l.nome,busca)+'</td>'+'<td class="horas">'+l.horas+'h</td>';
    tbody.appendChild(tr);
  });

  const nenhum = document.getElementById("nenhum");
  nenhum.style.display = linhas.length === 0 ? "block" : "none";

  const total = CURSOS.reduce((s, c) => s + c.unidades.length, 0);
  document.getElementById("contador").textContent =
    `${linhas.length} de ${total} unidades curriculares`;
}

// ── Ordenação por coluna ─────────────────────────────────────────────────────
document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll("thead th .seta").forEach(s => s.textContent = "");
    th.querySelector(".seta").textContent = sortAsc ? " ▲" : " ▼";
    renderizar();
  });
});

// ── Limpar filtros ───────────────────────────────────────────────────────────
document.getElementById("btn-limpar").addEventListener("click", () => {
  document.getElementById("busca").value = "";
  document.getElementById("filtro-curso").value = "";
  document.getElementById("filtro-modulo").value = "";
  document.getElementById("filtro-periodo").value = "";
  cursoFiltro = "";
  document.querySelectorAll(".card-curso").forEach(d => d.classList.remove("ativo"));
  renderizar();
});

// ── Eventos de filtro ────────────────────────────────────────────────────────
document.getElementById("busca").addEventListener("input", renderizar);
document.getElementById("filtro-curso").addEventListener("change", renderizar);
document.getElementById("filtro-modulo").addEventListener("change", renderizar);
document.getElementById("filtro-periodo").addEventListener("change", renderizar);

// ── Render inicial ────────────────────────────────────────────────────────────
renderizar();
</script>
